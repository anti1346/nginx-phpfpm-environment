  ####### Redis Cluster Nodes #######
  redis-node-1:
    image: redis:8.4
    container_name: redis-node-1
    hostname: redis-node-1
    command: >
      redis-server
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass redis_password
      --masterauth redis_password
    ports:
      - "7001:6379"
    volumes:
      - redis-data-1:/data
    networks:
      - laravel-network

  redis-node-2:
    image: redis:8.4
    container_name: redis-node-2
    hostname: redis-node-2
    command: >
      redis-server
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass redis_password
      --masterauth redis_password
    ports:
      - "7002:6379"
    volumes:
      - redis-data-2:/data
    networks:
      - laravel-network

  redis-node-3:
    image: redis:8.4
    container_name: redis-node-3
    hostname: redis-node-3
    command: >
      redis-server
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass redis_password
      --masterauth redis_password
    ports:
      - "7003:6379"
    volumes:
      - redis-data-3:/data
    networks:
      - laravel-network

  # Run cluster initialization automatically
  redis-cluster-init:
    image: redis:8.4
    container_name: redis-cluster-init
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
    entrypoint: >
      sh -c "
      sleep 5 &&
      echo 'yes' | redis-cli --cluster create
      redis-node-1:6379 redis-node-2:6379 redis-node-3:6379
      --cluster-replicas 0
      -a redis_password
      "
    networks:
      - laravel-network

volumes:
  mysql-data:
  redis-data-1:
  redis-data-2:
  redis-data-3:

networks:
  laravel-network:
    driver: bridge
