services:

  nginx:
    image: nginx:1.29-alpine
    container_name: nginx
    hostname: nginx
    volumes:
      - ./html:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - php-fpm
    ports:
      - "80:80"
    networks:
      - laravel-network

  php-fpm:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: anti1346/php-fpm:8.3
    container_name: php-fpm
    hostname: php-fpm
    environment:
      - DB_HOST=mysql
      - DB_DATABASE=laravel
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
    volumes:
      - ./html:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      # mysql:
      #   condition: service_healthy
      redis-cluster-init:
        condition: service_started
    networks:
      - laravel-network
    healthcheck:
      test: ["CMD", "php", "-r", "echo 'OK';"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # mysql:
  #   image: mysql:8.4
  #   container_name: mysql
  #   hostname: mysql
  #   environment:
  #     MYSQL_ROOT_PASSWORD: root
